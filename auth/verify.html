<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1e4d35">
<meta name="robots" content="noindex,nofollow">

<title>E-posta Onaylandı — Manevi Halka</title>

<link rel="icon" type="image/png" href="/icon.png">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
    background: linear-gradient(180deg, #f0f9f1 0%, #fefefe 60%);
    color: #1f2937;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    max-width: 440px;
    width: 100%;
    background: #fff;
    border-radius: 24px;
    padding: 40px 28px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(30, 77, 53, 0.15);
  }
  .check-circle {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    background: #1e4d35;
    color: #fff;
    margin: 0 auto 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    font-weight: 700;
    line-height: 1;
  }
  h1 {
    font-size: 26px;
    font-weight: 800;
    color: #1e4d35;
    margin-bottom: 12px;
    letter-spacing: -0.3px;
  }
  .message {
    font-size: 15px;
    color: #4b5563;
    line-height: 1.6;
    margin-bottom: 28px;
  }
  .hint {
    font-size: 13px;
    color: #6b7280;
    margin-bottom: 14px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    font-weight: 500;
  }
  .store-buttons {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  @media (min-width: 460px) {
    .store-buttons { flex-direction: row; justify-content: center; }
  }
  .btn-store {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 14px 22px;
    background: #1e4d35;
    color: #fff;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    transition: transform 0.15s;
  }
  .btn-store:hover { transform: translateY(-1px); }
  .footer {
    margin-top: 36px;
    font-size: 12px;
    color: #9ca3af;
  }
  .footer a {
    color: #1e4d35;
    text-decoration: none;
    font-weight: 500;
  }
</style>
</head>
<body>

<div class="card">
  <div class="check-circle">✓</div>
  <h1>E-posta Onaylandı</h1>
  <p class="message">
    Hesabınız başarıyla doğrulandı. Manevi Halka uygulamasını açın ve oturum açın.
  </p>

  <p class="hint">Uygulama yüklü değilse</p>
  <div class="store-buttons">
    <a href="https://apps.apple.com/app/manevi-halka/" class="btn-store" id="iosBtn">App Store</a>
    <a href="https://play.google.com/store/apps/details?id=com.emrhnayz.spiritualcircle" class="btn-store" id="androidBtn">Google Play</a>
  </div>

  <p class="footer">
    <a href="/">manevihalka.app</a> • <a href="mailto:emirhan.ayaz171@icloud.com">İletişim</a>
  </p>
</div>

<script>
  // Platforma göre uygun store butonunu öne çıkar
  var ua = navigator.userAgent || '';
  var isIOS = /iPad|iPhone|iPod/.test(ua);
  var isAndroid = /Android/.test(ua);
  if (isIOS) document.getElementById('androidBtn').style.display = 'none';
  if (isAndroid) document.getElementById('iosBtn').style.display = 'none';

  // Universal Link app yüklüyse zaten devraldı, bu sayfa görünmez.
  // Yine de scheme URL ile son bir deneme — bazı edge case'lerde işe yarar.
  // (App yoksa hiçbir şey olmaz, kullanıcı sayfada kalır)
  if (isIOS || isAndroid) {
    var hash = window.location.hash || '';
    setTimeout(function () {
      window.location.href = 'manevisosyal://auth-callback' + hash;
    }, 250);
  }
</script>

</body>
</html>
