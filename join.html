<html lang="tr">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<title>Manevi Halka — Halkaya Katıl</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(160deg, #f0fdf4 0%, #ffffff 50%, #f0fdf4 100%);
    color: #1f2937;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    max-width: 420px;
    width: 100%;
    background: #ffffff;
    border-radius: 20px;
    padding: 36px 28px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(30, 77, 53, 0.08);
    border: 1px solid #d1fae5;
  }
  .logo-wrap {
    width: 88px;
    height: 88px;
    margin: 0 auto 18px;
    border-radius: 22px;
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(30, 77, 53, 0.18);
  }
  .logo-wrap img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
  }
  .brand-name {
    font-size: 13px;
    color: #1e4d35;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  h1 {
    font-size: 22px;
    color: #1e4d35;
    margin-bottom: 10px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .subtitle {
    color: #6b7280;
    font-size: 14px;
    line-height: 1.5;
    margin-bottom: 28px;
  }
  .code-box {
    background: #f0fdf4;
    border: 1px dashed #d1fae5;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 24px;
  }
  .code-label {
    font-size: 11px;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .code {
    font-size: 24px;
    font-weight: 700;
    color: #1e4d35;
    letter-spacing: 4px;
    font-family: "SF Mono", Menlo, Consolas, monospace;
  }
  .btn {
    display: block;
    width: 100%;
    background: #1e4d35;
    color: #ffffff;
    text-decoration: none;
    padding: 14px 20px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 12px;
    transition: opacity 0.2s;
    border: none;
    cursor: pointer;
  }
  .btn:hover, .btn:active { opacity: 0.9; }
  .btn-secondary {
    background: transparent;
    color: #1e4d35;
    border: 1.5px solid #d1fae5;
  }
  .hint {
    color: #9ca3af;
    font-size: 12px;
    margin-top: 16px;
    line-height: 1.5;
  }
  .store-row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    justify-content: center;
  }
  .store-row a {
    text-decoration: none;
    color: #1e4d35;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid #d1fae5;
    background: #f0fdf4;
  }
  .footer {
    margin-top: 28px;
    padding-top: 18px;
    border-top: 1px solid #f3f4f6;
    color: #9ca3af;
    font-size: 11px;
  }
  .footer a { color: #1e4d35; text-decoration: none; }
  #fallback { display: none; }
  #fallback.show { display: block; }
</style>
</head>

        <a href="https://play.google.com/store/apps/details?id=com.emrhnayz.spiritualcircle" id="androidBtn">Google Play</a>
      </div>
    </div>

    <div class="footer">
      <a href="/">manevihalka.app</a> •
      <a href="/privacy.html">Gizlilik</a> •
      <a href="/terms.html">Şartlar</a>
    </div>
  </div>

<script>
  (function () {
    var params = new URLSearchParams(window.location.search);
    var code = (params.get('code') || '').toUpperCase().trim();
    var statusEl = document.getElementById('status');
    var codeBox = document.getElementById('codeBox');
    var codeText = document.getElementById('codeText');
    var fallback = document.getElementById('fallback');
    var openAppBtn = document.getElementById('openAppBtn');

    if (!code || !/^[A-Z0-9]{4,12}$/.test(code)) {
      statusEl.textContent = 'Geçersiz davet bağlantısı.';
      fallback.classList.add('show');
      return;
    }

    codeText.textContent = code;
    codeBox.style.display = 'block';

    var deepLink = 'manevisosyal://join/' + code;
    openAppBtn.href = deepLink;

    var ua = navigator.userAgent || '';
    var isIOS = /iPhone|iPad|iPod/i.test(ua);
    var isAndroid = /Android/i.test(ua);

    // App'i aç (custom scheme)
    function tryOpen() {
      // iOS Safari için iframe deep link yöntemi; Android için window.location
      if (isIOS) {
        var iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.src = deepLink;
        document.body.appendChild(iframe);
      } else {
        window.location.href = deepLink;
      }
    }

    // Kullanıcı app'i açtıysa sayfa background'a düşer; düşmediyse 2sn sonra fallback göster
    var fallbackTimer = setTimeout(function () {
      statusEl.textContent = 'Uygulama bulunamadı. Lütfen önce indir:';
      fallback.classList.add('show');
    }, 2500);

    // Sayfa visibility kaybederse fallback'i iptal et (app açıldı demek)
    function onVisibilityChange() {
      if (document.hidden) {
        clearTimeout(fallbackTimer);
      }
    }
    document.addEventListener('visibilitychange', onVisibilityChange);
    window.addEventListener('pagehide', onVisibilityChange);
    window.addEventListener('blur', onVisibilityChange);

    // 100ms sonra dene (DOM hazır)
    setTimeout(tryOpen, 100);
  })();
</script>
</body>
</html>
